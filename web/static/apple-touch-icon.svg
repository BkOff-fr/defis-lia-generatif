<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none" role="img" aria-label="Sobr.ia">
  <!--
    Apple touch / PWA icon Sobr.ia — variante « app icon » du design system
    (cf. preview/37-logo.html § ⑥ « App icon · iOS / desktop »).
    Conteneur ink arrondi, mark complet avec glow, à utiliser quand l'OS
    rasterise une tuile (iOS, Android, écran d'accueil PWA…).
  -->
  <defs>
    <radialGradient id="ati-bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#1a1d18"/>
      <stop offset="100%" stop-color="#0a0d0b"/>
    </radialGradient>
    <radialGradient id="ati-bg-glow" cx="70%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#c5f04a" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#c5f04a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ati-leaf" x1="20" y1="15" x2="85" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0ff80"/>
      <stop offset="60%" stop-color="#c5f04a"/>
      <stop offset="100%" stop-color="#7a9a32"/>
    </linearGradient>
    <linearGradient id="ati-vein" x1="0" x2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5f04a" stop-opacity=".25"/>
      <stop offset="50%" stop-color="#c5f04a"/>
      <stop offset="100%" stop-color="#c5f04a" stop-opacity=".25"/>
    </linearGradient>
    <radialGradient id="ati-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#e0ff80"/>
      <stop offset="100%" stop-color="#c5f04a"/>
    </radialGradient>
    <filter id="ati-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#ati-bg)"/>
  <rect width="180" height="180" rx="40" fill="url(#ati-bg-glow)"/>
  <g transform="translate(30 30) scale(1.2)">
    <g filter="url(#ati-glow)" opacity=".55">
      <path d="M 18 78 C 12 50, 32 18, 64 22 C 78 24, 86 36, 84 52 C 81 78, 52 88, 22 84"
            stroke="#c5f04a" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    </g>
    <path d="M 18 78 C 12 50, 32 18, 64 22 C 78 24, 86 36, 84 52 C 81 78, 52 88, 22 84"
          stroke="url(#ati-leaf)" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    <path d="M 22 84 C 30 70, 38 56, 48 50 C 60 42, 74 38, 84 52"
          stroke="url(#ati-leaf)" stroke-width="2.2" stroke-linecap="round" fill="none" opacity=".7"/>
    <path d="M 22 80 Q 38 64, 48 50 T 80 28"
          stroke="url(#ati-vein)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="6 4" fill="none"/>
    <circle cx="32" cy="72" r="3.4" fill="url(#ati-node)"/>
    <circle cx="50" cy="52" r="4.2" fill="url(#ati-node)"/>
    <circle cx="74" cy="32" r="3"   fill="url(#ati-node)"/>
    <circle cx="82" cy="26" r="1.2" fill="#c5f04a"/>
  </g>
</svg>
