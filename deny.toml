# Configuration cargo-deny — voir SECURITY.md.
# Vérifie licences, advisories, et bans de crates.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "wasm32-unknown-unknown" }
]

[advisories]
version = 2
# Tous les ignores ci-dessous sont des advisories « unmaintained » (aucune
# vulnérabilité active) — état au 2026-06-12, à réévaluer à chaque bump tauri.
ignore = [
    # gtk-rs GTK3 : tirés par tauri sur Linux. Pas de correctif tant que
    # tauri n'a pas migré hors GTK3 (suivi upstream tauri-apps/tauri#9662).
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # unic-* : via urlpattern -> tauri-utils, même attente que ci-dessus.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # proc-macro-error : transitif d'anciennes macros, sans alternative côté deps.
    "RUSTSEC-2024-0370",
    # rustls-pemfile : dép directe de sobria-team-aggregator.
    # TODO(sobria-team-aggregator): migrer vers rustls-pki-types::PemObject.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",   # webpki-roots (données racines Mozilla)
    "OpenSSL"   # uniquement si un transitif l'introduit ; on préfère rustls
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["MPL-2.0"]
crate = "webpki-roots"

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Les crates internes du workspace sont référencées par { path = ... } sans
# version (workspace privé, jamais publié) — ce ne sont pas des wildcards.
allow-wildcard-paths = true
deny = [
    # Politique anti-Electron : aucune raison qu'une dep Rust importe quelque chose à voir.
    { name = "openssl-sys", reason = "On utilise rustls (CLAUDE.md §7)" }
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
