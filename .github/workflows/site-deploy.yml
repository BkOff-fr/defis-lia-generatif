name: site-deploy

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'scripts/sync-docs.mjs'
      - '.github/workflows/site-deploy.yml'
  workflow_dispatch:

concurrency:
  group: site-deploy
  cancel-in-progress: false

permissions:
  contents: read

# Cible de déploiement — valeurs non secrètes, déjà documentées dans
# docs/operations/site-deploy.md. Auparavant en secrets GitHub, ce qui
# causait des silent failures quand un secret était vide (cf. run
# 26101912448 : « Could not resolve hostname : Name or service not known »
# avec hostname blanc, signe d'un secret SOBRIA_DEPLOY_HOST manquant).
# Seuls SSH_KEY et KNOWN_HOSTS restent secrets (matière sensible).
env:
  DEPLOY_USER: deployer
  DEPLOY_HOST: 80.11.20.55
  DEPLOY_PATH: /var/www/sobria-site/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Garde — secrets requis présents
        env:
          SSH_KEY: ${{ secrets.SOBRIA_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SOBRIA_DEPLOY_KNOWN_HOSTS }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secret SOBRIA_DEPLOY_SSH_KEY est vide ou manquant."
            echo "Ajoute-le via Settings → Secrets → Actions (clé privée ed25519)."
            exit 1
          fi
          if [ -z "$KNOWN_HOSTS" ]; then
            echo "::error::Secret SOBRIA_DEPLOY_KNOWN_HOSTS est vide ou manquant."
            echo "Génère avec : ssh-keyscan ${DEPLOY_HOST} 2>/dev/null"
            exit 1
          fi
          echo "::notice::Secrets OK. Cible : ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Sync docs into site/src/content/
        run: bash -c "node scripts/sync-docs.mjs"

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Lint + type check
        working-directory: site
        run: |
          npm run check
          npm run lint

      - name: Build Astro
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SOBRIA_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SOBRIA_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            site/dist/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Post-deploy smoke test
        run: |
          sleep 3
          curl -sfI https://sobria.brilliantstudio.co/ | head -1
          echo "✓ Site répond en HTTPS"
