# Configuration rustfmt — Sobr.ia
# Options stables uniquement (nightly retirées).
# Voir CLAUDE.md §4.1 pour les conventions de code.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4

reorder_imports = true
reorder_modules = true
use_field_init_shorthand = true
use_try_shorthand = true
match_block_trailing_comma = true
