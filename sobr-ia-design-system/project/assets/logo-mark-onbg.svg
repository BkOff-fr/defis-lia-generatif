<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Sobr.ia">
  <defs>
    <radialGradient id="sob-bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#1a1d18"/>
      <stop offset="100%" stop-color="#0a0d0b"/>
    </radialGradient>
    <radialGradient id="sob-bg-glow" cx="70%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#c5f04a" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#c5f04a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sob-leaf-bg" x1="20" y1="15" x2="85" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0ff80"/>
      <stop offset="60%" stop-color="#c5f04a"/>
      <stop offset="100%" stop-color="#7a9a32"/>
    </linearGradient>
    <linearGradient id="sob-vein-bg" x1="0" x2="100" gradientUnits="userSpaceOnUse">
