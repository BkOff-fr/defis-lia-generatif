      <stop offset="30%" stop-color="#e0ff80"/>
      <stop offset="100%" stop-color="#c5f04a"/>
    </radialGradient>
    <filter id="sob-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
