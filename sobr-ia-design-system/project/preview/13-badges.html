<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.row2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.lab{font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);width:90px;}
</style>
<div class="row"><span class="lbl">Badges · chips · pills</span><span class="hint">état + filtre + indicator</span></div>
<div class="row2"><span class="lab">Statut</span>
  <span class="badge badge--lime">Sobre A</span>
  <span class="badge badge--amber">Vigilance C</span>
  <span class="badge badge--coral">Alerte E</span>
  <span class="badge badge--blue">Info</span>
  <span class="badge">Neutre</span>
</div>
<div class="row2"><span class="lab">Chips filtre</span>
  <span class="chip active">Tous providers</span>
  <span class="chip">OpenAI</span>
  <span class="chip">Anthropic</span>
  <span class="chip">Mistral</span>
</div>
<div class="row2"><span class="lab">Pills</span>
  <span class="pill"><span class="dot"></span>100 % local</span>
  <span class="pill"><span class="dot"></span>Référentiel 2026.05.10</span>
</div>
</div></body></html>
