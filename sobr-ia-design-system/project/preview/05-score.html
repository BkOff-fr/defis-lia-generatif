<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.tile{aspect-ratio:1/1.1;border-radius:var(--radius-md);display:grid;place-items:center;grid-template-rows:1fr auto;padding:14px;position:relative;overflow:hidden;}
.tile .g{font:400 56px/1 var(--font-display);font-style:italic;}
.tile .desc{font:400 10px/1.3 var(--font-ui);text-align:center;opacity:.85;}
.tile.a{background:linear-gradient(180deg,#c5f04a,#a4dc4a);color:#0a0d0b;}
.tile.b{background:linear-gradient(180deg,#a4dc4a,#8db83a);color:#0a0d0b;}
.tile.c{background:linear-gradient(180deg,#f5b769,#e89a4a);color:#0a0d0b;}
.tile.d{background:linear-gradient(180deg,#f08c5a,#dc6f3a);color:#fff;}
.tile.e{background:linear-gradient(180deg,#f06c5a,#dc4f3a);color:#fff;}
.tile.f{background:linear-gradient(180deg,#d8453a,#b8332a);color:#fff;}
</style>
<div class="row"><span class="lbl">Score énergétique · A → F</span><span class="hint">gradient 6 paliers</span></div>
<div class="grid">
  <div class="tile a"><div class="g">A</div><div class="desc">< 2 Wh/req</div></div>
  <div class="tile b"><div class="g">B</div><div class="desc">2 – 5 Wh</div></div>
  <div class="tile c"><div class="g">C</div><div class="desc">5 – 10 Wh</div></div>
  <div class="tile d"><div class="g">D</div><div class="desc">10 – 20 Wh</div></div>
  <div class="tile e"><div class="g">E</div><div class="desc">20 – 50 Wh</div></div>
  <div class="tile f"><div class="g">F</div><div class="desc">> 50 Wh</div></div>
</div>
</div></body></html>
