<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.sw{aspect-ratio:1/1.05;border-radius:var(--radius-md);border:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;padding:12px 14px;position:relative;overflow:hidden;}
.sw .n{font:500 11px/1 var(--font-ui);color:var(--ivory);}
.sw .h{font:400 10px/1 var(--font-mono);color:var(--ivory-3);}
.sw.dark .n{color:var(--ivory);} .sw.dark .h{color:var(--ivory-3);}
.sw.light .n{color:#0a0d0b;} .sw.light .h{color:rgba(10,13,11,.5);}
</style>
<div class="row"><span class="lbl">Ink · fonds profonds</span><span class="hint">app · surface · élevation</span></div>
<div class="grid">
  <div class="sw dark" style="background:#0a0d0b"><span class="n">ink</span><span class="h">#0a0d0b</span></div>
  <div class="sw dark" style="background:#0e1310"><span class="n">ink-2</span><span class="h">#0e1310</span></div>
  <div class="sw dark" style="background:#131815"><span class="n">ink-3</span><span class="h">#131815</span></div>
  <div class="sw dark" style="background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(255,255,255,.005)),#0a0d0b"><span class="n">surface</span><span class="h">α .025</span></div>
  <div class="sw dark" style="background:rgba(255,255,255,.045);background-color:#171c19"><span class="n">surface-hi</span><span class="h">α .045</span></div>
  <div class="sw light" style="background:#f0ece3"><span class="n">ivory</span><span class="h">#f0ece3</span></div>
</div>
</div></body></html>
