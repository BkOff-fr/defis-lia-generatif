<!doctype html><html lang="fr"><head><meta charset="utf-8"><title>Ridge plot · distributions</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);min-height:100vh;position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 15%,rgba(197,240,74,.05),transparent 60%),radial-gradient(ellipse 400px 300px at 15% 85%,rgba(126,182,255,.04),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.head{display:flex;align-items:baseline;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.head .eye{font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.18em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.head .eye::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.head .t{font:400 26px/1 var(--font-display);font-style:italic;color:var(--ivory);letter-spacing:-.01em;}
.head .grow{flex:1;}
.head .meta{font:400 10px/1.3 var(--font-mono);color:var(--ivory-3);text-align:right;}
.card{background:linear-gradient(160deg,rgba(255,255,255,.025),rgba(255,255,255,.005));border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 26px;position:relative;}
.tip{position:fixed;pointer-events:none;background:rgba(10,13,11,.92);backdrop-filter:blur(20px);border:1px solid var(--border-hi);border-radius:var(--radius-md);padding:10px 13px;font:400 12px/1.4 var(--font-ui);color:var(--ivory);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:99;max-width:280px;opacity:0;transition:opacity 120ms;}
.tip.show{opacity:1;}
.tip .k{color:var(--ivory-3);font-size:10px;text-transform:uppercase;letter-spacing:.14em;}
.tip .v{font:400 18px/1 var(--font-display);font-style:italic;color:var(--ivory);margin:4px 0 2px;}
.tip .v .u{font:400 11px var(--font-ui);font-style:normal;color:var(--ivory-3);margin-left:3px;}
.tip .ci{font:400 11px/1.3 var(--font-mono);color:var(--lime);}
.tip .src{margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);font:400 10px/1.3 var(--font-mono);color:var(--ivory-3);}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.toolbar .lbl{font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);}
.toolbar .grow{flex:1;}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px;}
.seg button{background:transparent;border:none;color:var(--ivory-3);font:500 11px var(--font-ui);padding:6px 12px;border-radius:var(--radius-pill);cursor:pointer;transition:all 200ms;}
.seg button.on{background:var(--lime);color:var(--ivory-inv);font-weight:600;}
.seg button:hover:not(.on){color:var(--ivory);}
.foot{font:400 11px/1.4 var(--font-mono);color:var(--ivory-4);margin-top:10px;display:flex;justify-content:space-between;}
.foot a{color:var(--lime);border-bottom:1px dashed rgba(197,240,74,.4);}
input[type=range]{appearance:none;background:transparent;height:18px;width:100%;}
input[type=range]::-webkit-slider-runnable-track{height:2px;background:var(--border-hi);border-radius:1px;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:14px;height:14px;background:var(--lime);border:2px solid var(--ink);border-radius:50%;margin-top:-7px;cursor:pointer;box-shadow:0 0 8px var(--lime-glow);}
input[type=range]::-moz-range-track{height:2px;background:var(--border-hi);}
input[type=range]::-moz-range-thumb{width:14px;height:14px;background:var(--lime);border:2px solid var(--ink);border-radius:50%;cursor:pointer;}
</style></head><body><div class="amb"></div><div class="wrap">
<div class="head">
  <span class="eye">Module M3 · Workbench</span>
  <span class="t">Ridge plot · Wh/req par modèle</span>
  <span class="grow"></span>
  <span class="meta">8 modèles · KDE Gaussien<br>10 000 tirages chacun</span>
</div>
<div class="toolbar">
  <span class="lbl">Hauteur</span>
  <div class="seg" id="hSeg">
    <button class="on" data-h="abs">Absolue</button>
    <button data-h="norm">Normalisée</button>
  </div>
  <span class="lbl" style="margin-left:14px">Tri</span>
  <div class="seg" id="sSeg">
    <button class="on" data-s="med">Par médiane</button>
    <button data-s="prov">Par provider</button>
  </div>
  <span class="grow"></span>
  <span class="lbl">Filtre</span>
  <span class="chp" data-f="all">Tous</span>
  <span class="chp on" data-f="text">Texte uniquement</span>
</div>

<div class="card">
  <svg id="ridge" viewBox="0 0 680 380" width="100%" style="display:block;height:auto"></svg>
  <div class="foot" style="margin-top:6px">
    <span>Tri par médiane croissante · plus haut = distribution plus large (incertitude)</span>
    <span>Hover : médiane + IC 90%</span>
  </div>
</div>

<style>
.chp{display:inline-flex;align-items:center;height:26px;padding:0 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);font:500 11px var(--font-ui);color:var(--ivory-2);cursor:pointer;}
.chp.on{background:rgba(197,240,74,.12);border-color:rgba(197,240,74,.4);color:var(--lime);}
.ridge-row{cursor:pointer;}
.ridge-row:hover .area{fill:url(#hover);}
.ridge-row:hover .lbl{fill:var(--lime);}
</style>

<script>
const M=[
  {n:'Llama 3.1 8B',p:'Meta',med:1.2,sd:.18,col:'#c5f04a'},
  {n:'Mistral 7B',p:'Mistral',med:1.4,sd:.16,col:'#c5f04a'},
  {n:'GPT-4o-mini',p:'OpenAI',med:2.8,sd:.22,col:'#a4dc4a'},
  {n:'Gemini Flash',p:'Google',med:3.1,sd:.20,col:'#a4dc4a'},
  {n:'Mistral Large',p:'Mistral',med:9.8,sd:.28,col:'#f5b769'},
  {n:'Llama 3.1 70B',p:'Meta',med:11.4,sd:.30,col:'#f5b769'},
  {n:'Claude 3.5',p:'Anthropic',med:13.7,sd:.26,col:'#f08c5a'},
  {n:'GPT-4o',p:'OpenAI',med:14.2,sd:.32,col:'#f06c5a'},
];
const tip=document.getElementById('tip');
let mode='abs',sortBy='med';
function kde(med,sigma,N){
  // log-normal density at points
  const xs=[],ys=[];
  const lo=Math.log(med)-2.5*sigma,hi=Math.log(med)+3*sigma;
  for(let i=0;i<60;i++){
    const lx=lo+(hi-lo)*(i/59);
    const x=Math.exp(lx);
    const y=Math.exp(-0.5*Math.pow((lx-Math.log(med))/sigma,2))/(x*sigma*Math.sqrt(2*Math.PI));
    xs.push(x);ys.push(y);
  }
  return {xs,ys};
}
function render(){
  const svg=document.getElementById('ridge');
  let rows=[...M];
  if(sortBy==='med')rows.sort((a,b)=>a.med-b.med);
  else rows.sort((a,b)=>a.p.localeCompare(b.p)||a.med-b.med);
  const xMax=20;
  const xs=v=>140+(Math.log(v+1)/Math.log(xMax+1))*520;
  const rowH=40,topPad=20;
  const allKde=rows.map(m=>({m,k:kde(m.med,m.sd,60)}));
  const maxDens=Math.max(...allKde.flatMap(o=>o.k.ys));
  let h='<defs><linearGradient id="hover" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#c5f04a" stop-opacity=".8"/><stop offset="100%" stop-color="#c5f04a" stop-opacity=".2"/></linearGradient></defs>';
  // x grid
  [1,2,5,10,20].forEach(v=>{
    h+='<line x1="'+xs(v)+'" x2="'+xs(v)+'" y1="'+topPad+'" y2="'+(topPad+rows.length*rowH+8)+'" stroke="rgba(255,255,255,.05)"/>';
    h+='<text x="'+xs(v)+'" y="'+(topPad+rows.length*rowH+24)+'" font-family="JetBrains Mono" font-size="10" fill="#72706a" text-anchor="middle">'+v+' Wh</text>';
  });
  allKde.forEach((o,i)=>{
    const baseY=topPad+i*rowH+rowH-4;
    const maxThis=Math.max(...o.k.ys);
    const scale=mode==='norm'?(rowH*.85/maxThis):(rowH*.85/maxDens);
    let path='M'+xs(o.k.xs[0])+','+baseY;
    o.k.xs.forEach((x,j)=>{path+=' L'+xs(x)+','+(baseY-o.k.ys[j]*scale);});
    path+=' L'+xs(o.k.xs[o.k.xs.length-1])+','+baseY+' Z';
    const grad='g-'+i;
    h+='<defs><linearGradient id="'+grad+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+o.m.col+'" stop-opacity=".7"/><stop offset="100%" stop-color="'+o.m.col+'" stop-opacity=".1"/></linearGradient></defs>';
    h+='<g class="ridge-row" data-i="'+i+'">';
    h+='<path d="'+path+'" class="area" fill="url(#'+grad+')" stroke="'+o.m.col+'" stroke-width="1.2"/>';
    h+='<line x1="'+xs(o.m.med)+'" x2="'+xs(o.m.med)+'" y1="'+(baseY-rowH*.6)+'" y2="'+baseY+'" stroke="#0a0d0b" stroke-width="2"/>';
    h+='<line x1="'+xs(o.m.med)+'" x2="'+xs(o.m.med)+'" y1="'+(baseY-rowH*.6)+'" y2="'+baseY+'" stroke="'+o.m.col+'" stroke-width="1" stroke-dasharray="2 2"/>';
    h+='<text x="132" y="'+(baseY-rowH/2+5)+'" class="lbl" font-family="Instrument Serif" font-style="italic" font-size="14" fill="#f0ece3" text-anchor="end">'+o.m.n+'</text>';
    h+='<text x="132" y="'+(baseY-rowH/2+18)+'" font-family="Geist" font-size="8" fill="#72706a" text-anchor="end" letter-spacing=".1em" text-transform="uppercase">'+o.m.p.toUpperCase()+'</text>';
    h+='<text x="'+(xs(o.m.med)+4)+'" y="'+(baseY-4)+'" font-family="JetBrains Mono" font-size="9" fill="'+o.m.col+'">'+o.m.med.toFixed(1).replace('.',',')+'</text>';
    h+='</g>';
  });
  svg.setAttribute('viewBox','0 0 680 '+(topPad+rows.length*rowH+40));
  svg.innerHTML=h;
  svg.querySelectorAll('.ridge-row').forEach(g=>{
    const i=+g.dataset.i;const m=allKde[i].m;
    g.addEventListener('mousemove',e=>{
      const p5=Math.exp(Math.log(m.med)-1.645*m.sd),p95=Math.exp(Math.log(m.med)+1.645*m.sd);
      tip.innerHTML='<div class="k">'+m.n+'</div><div class="v">'+m.med.toFixed(2).replace('.',',')+'<span class="u">Wh/req</span></div><div class="ci">P5 '+p5.toFixed(2).replace('.',',')+' ─ P95 '+p95.toFixed(2).replace('.',',')+'</div><div class="src">'+m.p+' · KDE log-normale σ='+m.sd+'</div>';
      tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';tip.classList.add('show');
    });
    g.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  });
}
document.querySelectorAll('#hSeg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#hSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');mode=b.dataset.h;render();
}));
document.querySelectorAll('#sSeg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#sSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');sortBy=b.dataset.s;render();
}));
render();
</script>
</div><div class="tip" id="tip"></div></body></html>
