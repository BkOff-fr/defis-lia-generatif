<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.tbl{background:var(--ink-2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.tbl .th{display:grid;grid-template-columns:1.5fr 1fr .8fr .8fr 60px;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);}
.tbl .tr{display:grid;grid-template-columns:1.5fr 1fr .8fr .8fr 60px;gap:12px;padding:14px 18px;border-bottom:1px dashed var(--border);font:400 13px var(--font-ui);color:var(--ivory-2);align-items:center;}
.tbl .tr:last-child{border-bottom:none;}
.tbl .tr:hover{background:rgba(255,255,255,.015);}
.tbl .nm{color:var(--ivory);font-weight:500;display:flex;align-items:center;gap:8px;}
.tbl .nm .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);}
.tbl .mn{font-family:var(--font-mono);font-size:12px;color:var(--ivory-2);}
.tbl .gr{font:400 18px/1 var(--font-display);font-style:italic;text-align:center;}
.tbl .gr.a{color:#c5f04a;} .tbl .gr.b{color:#a4dc4a;} .tbl .gr.c{color:#f5b769;} .tbl .gr.d{color:#f08c5a;}
</style>
<div class="tbl">
  <div class="th"><span>Modèle</span><span>Provider · params</span><span>CO₂eq</span><span>Wh/req</span><span>Score</span></div>
  <div class="tr"><span class="nm"><span class="dot"></span>GPT-4o-mini</span><span>OpenAI · ~8B</span><span class="mn">2,0 g</span><span class="mn">4,9 Wh</span><span class="gr b">B</span></div>
  <div class="tr"><span class="nm"><span class="dot" style="background:#b794f4"></span>Claude 3.5 Sonnet</span><span>Anthropic · ~200B*</span><span class="mn">5,4 g</span><span class="mn">13,7 Wh</span><span class="gr c">C</span></div>
  <div class="tr"><span class="nm"><span class="dot" style="background:#f5b769"></span>Mistral Large 2</span><span>Mistral · 123B</span><span class="mn">3,9 g</span><span class="mn">9,8 Wh</span><span class="gr b">B</span></div>
  <div class="tr"><span class="nm"><span class="dot" style="background:#7eb6ff"></span>Llama 3.1 8B</span><span>Meta · 8B · open</span><span class="mn">0,5 g</span><span class="mn">1,2 Wh</span><span class="gr a">A</span></div>
  <div class="tr"><span class="nm"><span class="dot" style="background:#f06c5a"></span>GPT-4o</span><span>OpenAI · ~200B</span><span class="mn">5,8 g</span><span class="mn">14,2 Wh</span><span class="gr c">C</span></div>
</div>
</div></body></html>
