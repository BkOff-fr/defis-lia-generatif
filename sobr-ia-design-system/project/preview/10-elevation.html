<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:12px;}
.tile{height:120px;background:linear-gradient(160deg,rgba(255,255,255,.025),rgba(255,255,255,.005));border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;justify-content:space-between;padding:14px 16px;}
.tile .nm{font:500 11px/1 var(--font-ui);color:var(--ivory);}
.tile .hint{font:400 10px/1.3 var(--font-mono);color:var(--ivory-3);}
.t2{box-shadow:0 8px 32px -12px rgba(0,0,0,.5);}
.t3{box-shadow:0 12px 40px -8px rgba(0,0,0,.55);border-color:var(--border-hi);}
.t4{box-shadow:0 0 0 4px rgba(197,240,74,.15),0 8px 32px -8px rgba(197,240,74,.7);border-color:rgba(197,240,74,.4);background:linear-gradient(160deg,rgba(197,240,74,.08),rgba(255,255,255,.01));}
</style>
<div class="row"><span class="lbl">Élévation · hairlines + lime glow</span><span class="hint">flat · soft · pop · glow</span></div>
<div class="grid">
  <div class="tile"><div class="nm">flat</div><div class="hint">border 1px<br>0 shadow</div></div>
  <div class="tile t2"><div class="nm">soft</div><div class="hint">shadow-soft<br>cartes hover</div></div>
  <div class="tile t3"><div class="nm">pop</div><div class="hint">shadow-pop<br>popovers · menus</div></div>
  <div class="tile t4"><div class="nm" style="color:var(--lime)">glow-lime</div><div class="hint">primary action<br>focus state</div></div>
</div>
</div></body></html>
