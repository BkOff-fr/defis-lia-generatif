<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.sw{height:96px;border-radius:var(--radius-md);border:1px solid var(--border);padding:14px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.sw .dot{width:18px;height:18px;border-radius:50%;box-shadow:0 0 12px currentColor;}
.sw .nm{font:500 12px/1 var(--font-ui);color:var(--ivory);}
.sw .h{font:400 10px/1 var(--font-mono);color:var(--ivory-3);}
.sw .role{font:400 10px/1.3 var(--font-ui);color:var(--ivory-3);margin-top:2px;}
.sw.lime{background:linear-gradient(160deg,rgba(197,240,74,.10),rgba(197,240,74,.02));border-color:rgba(197,240,74,.25);}
.sw.lime .dot{background:#c5f04a;color:#c5f04a;}
.sw.amber .dot{background:#f5b769;color:#f5b769;}
.sw.coral .dot{background:#f06c5a;color:#f06c5a;}
.sw.blue .dot{background:#7eb6ff;color:#7eb6ff;}
.sw.violet .dot{background:#b794f4;color:#b794f4;}
</style>
<div class="row"><span class="lbl">Accents sémantiques</span><span class="hint">lime = signature · autres = état</span></div>
<div class="grid">
  <div class="sw lime"><span class="dot"></span><div><div class="nm">lime</div><div class="h">#c5f04a</div><div class="role">marque · succès · sobriété</div></div></div>
  <div class="sw amber"><span class="dot"></span><div><div class="nm">amber</div><div class="h">#f5b769</div><div class="role">vigilance · score C/D</div></div></div>
  <div class="sw coral"><span class="dot"></span><div><div class="nm">coral</div><div class="h">#f06c5a</div><div class="role">alerte · erreur · score E/F</div></div></div>
  <div class="sw blue"><span class="dot"></span><div><div class="nm">blue</div><div class="h">#7eb6ff</div><div class="role">info · lien neutre</div></div></div>
  <div class="sw violet"><span class="dot"></span><div><div class="nm">violet</div><div class="h">#b794f4</div><div class="role">scénario alternatif</div></div></div>
</div>
</div></body></html>
