<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.eq{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.tile{padding:18px;background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);border:1px solid var(--border);border-radius:var(--radius-md);display:flex;gap:14px;align-items:center;}
.tile .ico{width:36px;height:36px;flex-shrink:0;display:grid;place-items:center;color:var(--lime);}
.tile .v{font:400 22px/1 var(--font-display);font-style:italic;color:var(--ivory);}
.tile .t{font:400 12px/1.3 var(--font-ui);color:var(--ivory-3);margin-top:3px;}
</style>
<div class="row"><span class="lbl">Equivalents · traduction parlante</span><span class="hint">distance · durée · échelle</span></div>
<div class="eq">
  <div class="tile">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 17H6a2 2 0 01-2-2V8a2 2 0 012-2h12a2 2 0 012 2v4M4 11h16m-4 6l3 3m0 0l3-3m-3 3v-6"/></svg></div>
    <div><div class="v">17 m</div><div class="t">en voiture thermique</div></div>
  </div>
  <div class="tile">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c0 0-5 5-5 9a5 5 0 0010 0c0-4-5-9-5-9z"/></svg></div>
    <div><div class="v">0,5 s</div><div class="t">de douche chaude</div></div>
  </div>
  <div class="tile">
    <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg></div>
    <div><div class="v">9 200</div><div class="t">vols Paris-NY (cumul 5 ans)</div></div>
  </div>
</div>
</div></body></html>
