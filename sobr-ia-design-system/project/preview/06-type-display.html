<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.spec{padding:24px 28px;background:linear-gradient(160deg,rgba(255,255,255,.025),rgba(255,255,255,.005));border:1px solid var(--border);border-radius:var(--radius-lg);position:relative;overflow:hidden;}
.spec::after{content:'';position:absolute;top:0;right:0;width:300px;height:200px;background:radial-gradient(ellipse at top right,rgba(197,240,74,.08),transparent 60%);pointer-events:none;}
.sp{display:flex;align-items:baseline;gap:20px;flex-wrap:wrap;}
.disp{font:400 64px/1.05 var(--font-display);font-style:italic;color:var(--ivory);letter-spacing:-.02em;}
.disp em{font-style:normal;color:var(--lime);}
.meta{display:flex;gap:12px;margin-top:14px;font:400 11px/1 var(--font-mono);color:var(--ivory-3);}
.meta span{padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);}
</style>
<div class="row"><span class="lbl">Display · Instrument Serif italic</span><span class="hint">font-display · titres éditoriaux</span></div>
<div class="spec">
  <div class="disp">Mesurez la <em>sobriété</em> de votre IA.</div>
  <div class="meta">
    <span>Instrument Serif</span><span>italic · 400</span><span>64 / 1.05</span><span>tracking −0.02em</span>
  </div>
</div>
</div></body></html>
