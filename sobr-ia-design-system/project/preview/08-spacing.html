<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:flex;align-items:flex-end;gap:18px;padding-top:30px;}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
.bar{background:var(--lime-soft);border:1px solid rgba(197,240,74,.3);border-radius:4px;width:28px;}
.nm{font:500 10px/1 var(--font-mono);color:var(--ivory-2);}
.px{font:400 10px/1 var(--font-mono);color:var(--ivory-4);}
</style>
<div class="row"><span class="lbl">Espacement · grille 4 px</span><span class="hint">space-1 → space-8</span></div>
<div class="grid">
  <div class="cell"><div class="bar" style="height:4px"></div><div class="nm">space-1</div><div class="px">4</div></div>
  <div class="cell"><div class="bar" style="height:8px"></div><div class="nm">space-2</div><div class="px">8</div></div>
  <div class="cell"><div class="bar" style="height:12px"></div><div class="nm">space-3</div><div class="px">12</div></div>
  <div class="cell"><div class="bar" style="height:16px"></div><div class="nm">space-4</div><div class="px">16</div></div>
  <div class="cell"><div class="bar" style="height:24px"></div><div class="nm">space-5</div><div class="px">24</div></div>
  <div class="cell"><div class="bar" style="height:32px"></div><div class="nm">space-6</div><div class="px">32</div></div>
  <div class="cell"><div class="bar" style="height:40px"></div><div class="nm">space-7</div><div class="px">40</div></div>
  <div class="cell"><div class="bar" style="height:64px"></div><div class="nm">space-8</div><div class="px">64</div></div>
</div>
</div></body></html>
