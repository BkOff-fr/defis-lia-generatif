<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.sb{display:flex;align-items:center;gap:16px;padding:10px 18px;background:rgba(10,13,11,.55);backdrop-filter:blur(20px) saturate(140%);border:1px solid var(--border);border-radius:var(--radius-md);}
.sb .grow{flex:1;}
.sb-item{display:inline-flex;align-items:center;gap:8px;font:400 11px/1 var(--font-mono);color:var(--ivory-3);}
.sb-item.lime{color:var(--lime);}
.sb-item .d{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}
.sep{width:1px;height:14px;background:var(--border);}
</style>
<div class="row"><span class="lbl">Status bar persistante</span><span class="hint">100% local · v0.1.0</span></div>
<div class="sb">
  <span class="sb-item lime"><span class="d"></span>100 % local · aucune donnée envoyée</span>
  <span class="sep"></span>
  <span class="sb-item">Référentiel 2026.05.10</span>
  <span class="sep"></span>
  <span class="sb-item">v0.1.0 · build 2c8e0a9</span>
  <span class="grow"></span>
  <span class="sb-item"><span class="d" style="background:#f5b769;box-shadow:0 0 8px #f5b769"></span>3 alertes</span>
</div>
</div></body></html>
