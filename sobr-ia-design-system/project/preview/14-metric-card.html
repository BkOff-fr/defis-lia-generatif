<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.mc{padding:24px 28px;background:linear-gradient(160deg,rgba(197,240,74,.05),rgba(255,255,255,.005));border:1px solid var(--border);border-radius:var(--radius-xl);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;}
.mc::after{content:'';position:absolute;top:-40%;right:-20%;width:60%;height:160%;background:radial-gradient(ellipse at center,rgba(197,240,74,.10),transparent 60%);filter:blur(40px);pointer-events:none;}
.mc .lab{font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);margin-bottom:8px;}
.mc .val{font:400 72px/1 var(--font-display);font-style:italic;color:var(--ivory);letter-spacing:-.02em;}
.mc .val .u{font:400 16px/1 var(--font-ui);font-style:normal;color:var(--ivory-3);margin-left:8px;}
.mc .iv{font:400 12px/1 var(--font-mono);color:var(--ivory-3);margin-top:8px;}
.mc .iv b{color:var(--lime);font-weight:500;}
.mc .ring{width:84px;height:84px;position:relative;flex-shrink:0;}
.mc .ring svg{transform:rotate(-90deg);}
.mc .ring .bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:5;}
.mc .ring .fg{fill:none;stroke:var(--lime);stroke-width:5;stroke-linecap:round;filter:drop-shadow(0 0 6px var(--lime-glow));}
.mc .ring .gr{position:absolute;inset:0;display:grid;place-items:center;font:400 32px/1 var(--font-display);font-style:italic;color:var(--ivory);}
</style>
<div class="mc">
  <div>
    <div class="lab">CO₂eq · estimation P50</div>
    <div class="val">2,14<span class="u">g</span></div>
    <div class="iv">P5 <b>1,68</b> ─ P95 <b>2,74</b> · 10 000 Monte-Carlo</div>
  </div>
  <div class="ring">
    <svg viewBox="0 0 84 84" width="84" height="84"><circle class="bg" cx="42" cy="42" r="36"/><circle class="fg" cx="42" cy="42" r="36" stroke-dasharray="226" stroke-dashoffset="56"/></svg>
    <div class="gr">B</div>
  </div>
</div>
</div></body></html>
