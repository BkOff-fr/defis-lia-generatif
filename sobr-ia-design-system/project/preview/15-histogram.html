<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.h-card{padding:22px 26px;background:linear-gradient(160deg,rgba(255,255,255,.025),rgba(255,255,255,.005));border:1px solid var(--border);border-radius:var(--radius-lg);}
.h-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
.h-head .t{font:400 22px/1 var(--font-display);font-style:italic;color:var(--ivory);}
.h-head .n{font:400 11px/1 var(--font-mono);color:var(--ivory-3);margin-left:auto;}
.h-svg{width:100%;height:170px;}
</style>
<div class="h-card">
  <div class="h-head"><i style="width:14px;height:14px;background:var(--lime);box-shadow:0 0 8px var(--lime-glow);border-radius:50%"></i><span class="t">Distribution Monte-Carlo</span><span class="n">N = 10 000 · gCO₂eq</span></div>
  <svg class="h-svg" viewBox="0 0 660 170" preserveAspectRatio="none">
    <defs>
      <linearGradient id="hgrad" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="#c5f04a" stop-opacity=".8"/>
        <stop offset="100%" stop-color="#c5f04a" stop-opacity=".15"/>
      </linearGradient>
    </defs>
    <g stroke="rgba(255,255,255,.05)" stroke-width="1">
      <line x1="20" x2="640" y1="40" y2="40"/><line x1="20" x2="640" y1="90" y2="90"/><line x1="20" x2="640" y1="140" y2="140"/>
    </g>
    <!-- bars -->
    <g fill="url(#hgrad)">
      <rect x="40" y="135" width="22" height="10"/><rect x="68" y="125" width="22" height="20"/><rect x="96" y="110" width="22" height="35"/>
      <rect x="124" y="90" width="22" height="55"/><rect x="152" y="65" width="22" height="80"/><rect x="180" y="42" width="22" height="103"/>
      <rect x="208" y="28" width="22" height="117"/><rect x="236" y="22" width="22" height="123"/><rect x="264" y="32" width="22" height="113"/>
      <rect x="292" y="48" width="22" height="97"/><rect x="320" y="70" width="22" height="75"/><rect x="348" y="92" width="22" height="53"/>
      <rect x="376" y="108" width="22" height="37"/><rect x="404" y="120" width="22" height="25"/><rect x="432" y="130" width="22" height="15"/>
      <rect x="460" y="138" width="22" height="7"/>
    </g>
    <!-- p5-p95 band -->
    <line x1="100" x2="100" y1="20" y2="155" stroke="#c5f04a" stroke-dasharray="3 3" stroke-width="1" opacity=".6"/>
    <line x1="450" x2="450" y1="20" y2="155" stroke="#c5f04a" stroke-dasharray="3 3" stroke-width="1" opacity=".6"/>
    <text x="100" y="14" font-family="JetBrains Mono" font-size="10" fill="#c5f04a" text-anchor="middle">P5</text>
    <text x="450" y="14" font-family="JetBrains Mono" font-size="10" fill="#c5f04a" text-anchor="middle">P95</text>
    <!-- x-axis -->
    <g font-family="JetBrains Mono" font-size="10" fill="rgba(184,180,172,.55)" text-anchor="middle">
      <text x="100" y="165">1,5</text><text x="200" y="165">1,9</text><text x="300" y="165">2,3</text><text x="400" y="165">2,7</text><text x="500" y="165">3,1</text>
    </g>
  </svg>
</div>
</div></body></html>
