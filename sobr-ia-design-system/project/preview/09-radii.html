<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:flex;gap:18px;align-items:flex-end;}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
.shape{width:84px;height:84px;background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid var(--border);}
.shape.glow{box-shadow:inset 0 0 0 1px rgba(197,240,74,.2),0 0 0 1px rgba(197,240,74,.15);background:linear-gradient(160deg,rgba(197,240,74,.06),rgba(255,255,255,.01));}
.nm{font:500 10px/1 var(--font-mono);color:var(--ivory-2);}
.px{font:400 10px/1 var(--font-mono);color:var(--ivory-4);}
</style>
<div class="row"><span class="lbl">Rayons · 6 → 28 px + pill</span><span class="hint">radius-sm → radius-pill</span></div>
<div class="grid">
  <div class="cell"><div class="shape" style="border-radius:6px"></div><div class="nm">radius-sm</div><div class="px">6 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:12px"></div><div class="nm">radius-md</div><div class="px">12 px</div></div>
  <div class="cell"><div class="shape glow" style="border-radius:18px"></div><div class="nm">radius-lg</div><div class="px">18 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:28px"></div><div class="nm">radius-xl</div><div class="px">28 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:9999px;width:128px"></div><div class="nm">radius-pill</div><div class="px">9999 px</div></div>
</div>
</div></body></html>
