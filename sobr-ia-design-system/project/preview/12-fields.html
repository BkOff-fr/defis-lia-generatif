<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.f{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center;margin-bottom:14px;}
.f .l{font:500 10px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);}
.search-box{display:flex;align-items:center;gap:8px;height:40px;padding:0 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-pill);}
.search-box svg{color:var(--ivory-3);}
.search-box input{background:none;border:none;outline:none;color:var(--ivory);font:400 13px var(--font-ui);flex:1;}
.search-box input::placeholder{color:var(--ivory-4);}
</style>
<div class="row"><span class="lbl">Champs · input · textarea · search</span><span class="hint">40 px · radius-md / pill</span></div>
<div class="f"><span class="l">Input</span><input class="input" placeholder="GPT-4o-mini"/></div>
<div class="f"><span class="l">Search</span><div class="search-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input placeholder="Rechercher : llama, claude…"/></div></div>
<div class="f"><span class="l">Textarea</span><textarea class="input" rows="2" placeholder="Écris-moi un résumé de 500 mots sur la photosynthèse…"></textarea></div>
</div></body></html>
