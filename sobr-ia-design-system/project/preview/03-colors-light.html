<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--ink);position:relative;overflow:hidden;}
.amb{position:fixed;inset:0;z-index:0;pointer-events:none;}
.amb::before{content:'';position:absolute;inset:-10%;background:radial-gradient(ellipse 500px 300px at 80% 20%,rgba(197,240,74,.06),transparent 60%);filter:blur(20px);}
.wrap{position:relative;z-index:1;}
.row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.row .lbl{font:500 11px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--ivory-3);display:inline-flex;align-items:center;gap:8px;}
.row .lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime-glow);}
.row .hint{font:400 11px/1.3 var(--font-ui);color:var(--ivory-4);margin-left:auto;font-family:var(--font-mono);}
</style></head><body><div class="amb"></div><div class="wrap">
<style>
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.sw{aspect-ratio:1/1.05;border-radius:var(--radius-md);border:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;justify-content:space-between;padding:12px 14px;}
.sw .n{font:500 11px/1 var(--font-ui);color:#1a1d18;}
.sw .h{font:400 10px/1 var(--font-mono);color:#7a786e;}
</style>
<div class="row"><span class="lbl">Paper · mode clair (opt-in)</span><span class="hint">.theme-light</span></div>
<div class="grid">
  <div class="sw" style="background:#f7f5ef"><span class="n">ink</span><span class="h">#f7f5ef</span></div>
  <div class="sw" style="background:#f0ece3"><span class="n">ink-2</span><span class="h">#f0ece3</span></div>
  <div class="sw" style="background:#e7e2d5"><span class="n">ink-3</span><span class="h">#e7e2d5</span></div>
  <div class="sw" style="background:#1a1d18"><span class="n" style="color:#f7f5ef">ivory</span><span class="h" style="color:#b0aea4">#1a1d18</span></div>
  <div class="sw" style="background:#4a4d44"><span class="n" style="color:#f7f5ef">ivory-2</span><span class="h" style="color:#b0aea4">#4a4d44</span></div>
  <div class="sw" style="background:#6b8e1f"><span class="n" style="color:#f7f5ef">lime</span><span class="h" style="color:rgba(247,245,239,.7)">#6b8e1f</span></div>
</div>
</div></body></html>
