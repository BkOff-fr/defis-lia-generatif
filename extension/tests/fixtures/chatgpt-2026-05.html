<!doctype html>
<!--
  Fixture statique ChatGPT — capturée 2026-05 (anonymisée, simplifiée).
  Sert aux tests unit + e2e à valider que le content script repère bien
  textarea + bouton + label modèle, sans dépendance internet.
  À régénérer manuellement quand le DOM ChatGPT drift (cf. brief C27 §6).
-->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>ChatGPT (fixture 2026-05)</title>
  </head>
  <body>
    <main>
      <header>
        <button data-testid="model-switcher-dropdown-button">ChatGPT 4o</button>
      </header>
      <div role="presentation" class="conversation">
        <div data-message-author-role="user">Bonjour, comment vas-tu ?</div>
      </div>
      <form>
        <label>
          <textarea id="prompt-textarea" name="prompt">
Quelle est l'empreinte d'un prompt ?</textarea
          >
        </label>
        <button data-testid="send-button" aria-label="Send prompt">Envoyer</button>
      </form>
    </main>
  </body>
</html>
