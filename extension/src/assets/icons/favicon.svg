<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-label="Sobr.ia">
  <!--
    Favicon Sobr.ia — variante simplifiée du logo mark
    (cf. design system, preview/37-logo.html § ⑥ « En situation »).
    Stroke 9 + nœud central solide lime : reste lisible à 16 px.
    Fond transparent → s'affiche correctement sur les chromes sombres
    (ink #1a1d18) et lime sur les chromes clairs (le contraste se fait
    sur le tracé épais).
  -->
  <path d="M 18 78 C 12 50, 32 18, 64 22 C 78 24, 86 36, 84 52 C 81 78, 52 88, 22 84"
        stroke="#c5f04a" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="52" r="9" fill="#c5f04a"/>
</svg>
